<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="/favicon.png" rel="icon" type="image/png"/>
    <title>Run-Calc</title>
    <script>
        (function () {
            var raw = localStorage.getItem('calc.theme');
            var theme = { type: 'system' };

            if (raw) {
                try {
                    var parsed = JSON.parse(raw);
                    theme = (parsed && typeof parsed === 'object') ? parsed : { type: parsed };
                } catch {
                    theme = { type: raw };
                }
            }

            var resolved = theme.type === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : theme.type;

            if (resolved === 'custom') {
                resolved = theme.customThemeBase || 'dark';
            }

            if (resolved !== 'dark' && resolved !== 'light') {
                resolved = 'dark';
            }

            document.documentElement.setAttribute('data-theme', resolved);
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script src="./src/main.tsx" type="module"></script>
</body>
</html>
