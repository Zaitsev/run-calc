name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_verify:
        description: 'Skip verify checks (temporary)'
        type: boolean
        required: false
        default: false
      build_target:
        description: 'Build target OS'
        type: choice
        required: false
        default: all
        options:
          - all
          - windows
          - macos

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: Run-Calc
  GO_VERSION: '1.23.0'
  NODE_VERSION: '20'
  WAILS_VERSION: 'v2.12.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Derive artifact version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify
    runs-on: ubuntu-22.04
    steps:
      - name: Verify skipped by manual input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_verify }}
        run: echo "Skipping Verify checks for this manual run"

      - name: Check out repository
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        uses: actions/checkout@v4

      - name: Set up Go
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install frontend dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Run frontend production build
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        run: xvfb-run -a go test ./...

      - name: Run frontend tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
        working-directory: frontend
        run: npm test

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.build_target == 'windows' && '[{"os":"windows-latest","label":"Windows","artifact_name":"release-windows"}]' || inputs.build_target == 'macos' && '[{"os":"macos-latest","label":"macOS","artifact_name":"release-macos"}]' || '[{"os":"windows-latest","label":"Windows","artifact_name":"release-windows"},{"os":"macos-latest","label":"macOS","artifact_name":"release-macos"}]') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
          # Disable built-in cache on Windows: Git tar.exe fails on paths with spaces (C:\Program Files)
          cache: ${{ runner.os != 'Windows' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Disable built-in cache on Windows: Git tar.exe fails on paths with spaces (C:\Program Files)
          cache: ${{ runner.os != 'Windows' && 'npm' || '' }}
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Ensure NSIS is available
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Search known locations first (pre-installed on windows-latest)
          $searchPaths = @(
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS",
            "C:\ProgramData\chocolatey\bin"
          )
          $makensis = $searchPaths |
            ForEach-Object { Join-Path $_ "makensis.exe" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $makensis) {
            Write-Host "NSIS not pre-installed; installing via Chocolatey..."
            choco install nsis --yes --no-progress
            if ($LASTEXITCODE -ne 0) {
              throw "Chocolatey failed to install NSIS (exit code $LASTEXITCODE)."
            }
            # Re-search after install
            $makensis = $searchPaths |
              ForEach-Object { Join-Path $_ "makensis.exe" } |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1
          }

          if (-not $makensis) {
            throw "makensis.exe not found in any known location after install attempt."
          }

          $nsisDir = Split-Path $makensis
          Write-Host "Using NSIS from: $nsisDir"
          # Export to PATH for subsequent steps (GITHUB_PATH is the proper mechanism)
          "$nsisDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Also export as env var so the build step can reference it directly if needed
          "MAKENSIS=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Add Go bin to PATH
        if: runner.os != 'Windows'
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Add Go bin to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            xvfb-run -a wails build -clean
          else
            wails build -clean
          fi

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: wails build -clean -nsis

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release
          chmod +x ./scripts/package-linux-appimage.sh
          APP_NAME="${APP_NAME}" VERSION="${VERSION}" ./scripts/package-linux-appimage.sh
          tar -C build/bin -czf "release/${APP_NAME}-${VERSION}-linux.tar.gz" "${APP_NAME}"

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release
          ditto -c -k --keepParent "build/bin/${APP_NAME}.app" "release/${APP_NAME}-${VERSION}-macos.zip"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          if (-not (Test-Path "build/bin/${env:APP_NAME}.exe")) {
            throw "Standalone executable was not generated at build/bin/${env:APP_NAME}.exe."
          }
          Compress-Archive -Path "build/bin/${env:APP_NAME}.exe" `
            -DestinationPath "release/${env:APP_NAME}-${env:VERSION}-windows-standalone.zip" -Force
          $installer = Get-ChildItem "build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Windows installer was not generated. Expected a *-installer.exe file in build/bin."
          }
          Compress-Archive -Path $installer.FullName `
            -DestinationPath "release/${env:APP_NAME}-${env:VERSION}-windows-installer.zip" -Force

      - name: Upload packaged artifacts (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

      - name: Upload Windows standalone artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-standalone
          path: release/*-windows-standalone.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: release/*-windows-installer.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
