name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: Run-Calc
  GO_VERSION: '1.23.0'
  NODE_VERSION: '20'
  WAILS_VERSION: 'v2.12.0'

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Derive artifact version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend production build
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: xvfb-run -a go test ./...

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: release-linux
          - os: windows-latest
            label: Windows
            artifact_name: release-windows
          - os: macos-latest
            label: macOS
            artifact_name: release-macos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Add Go bin to PATH
        if: runner.os != 'Windows'
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Add Go bin to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: wails build -clean

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: wails build -clean -nsis

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release
          tar -C build/bin -czf "release/${APP_NAME}-${VERSION}-linux.tar.gz" "${APP_NAME}"

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release
          ditto -c -k --keepParent "build/bin/${APP_NAME}.app" "release/${APP_NAME}-${VERSION}-macos.zip"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "build/bin/${env:APP_NAME}.exe" -DestinationPath "release/${env:APP_NAME}-${env:VERSION}-windows.zip" -Force
          $installer = Get-ChildItem "build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if ($null -ne $installer) {
            Copy-Item $installer.FullName "release/$($installer.Name)"
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
