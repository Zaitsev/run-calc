name: CodeQL

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  schedule:
    - cron: '20 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: manual

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: go.sum

      - name: Set up Node.js
        if: matrix.language == 'go'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.language == 'go'
        run: |
          sudo apt-get update
          WEBKIT_PACKAGE="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PACKAGE" >/dev/null 2>&1; then
            WEBKIT_PACKAGE="libwebkit2gtk-4.0-dev"
          fi

          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PACKAGE" \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Build frontend assets for Go analysis
        if: matrix.language == 'go'
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build Go project for CodeQL
        if: matrix.language == 'go'
        run: xvfb-run -a go build ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'